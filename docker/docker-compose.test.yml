# Minimal test environment for Plane + Lazy-Bird integration testing.
# Based on Plane's official docker-compose but stripped to essentials
# (no minio, admin, space, live).
#
# Usage:
#   docker compose -f docker/docker-compose.test.yml up --build --abort-on-container-exit test-runner
#
# Services:
#   plane-db        — PostgreSQL 15 (Plane's database)
#   plane-redis     — Valkey 7 (Plane's cache/queue broker)
#   plane-api       — Plane backend API with plane_lazy_bird installed
#   lazy-bird-mock  — Lightweight FastAPI mock of the Lazy-Bird API
#   test-runner     — Runs integration tests against the live stack

services:
  plane-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: plane
      POSTGRES_PASSWORD: plane
      POSTGRES_DB: plane
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plane -d plane"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  plane-redis:
    image: valkey/valkey:7-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  plane-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.plane-api
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://plane:plane@plane-db:5432/plane"
      REDIS_URL: "redis://plane-redis:6379"
      SECRET_KEY: "test-secret-key-not-for-production"
      DJANGO_SETTINGS_MODULE: "plane.settings.production"
      # Lazy-Bird integration settings
      LAZY_BIRD_API_URL: "http://lazy-bird-mock:9000"
      LAZY_BIRD_API_KEY: "lb_test_integration_key"
      LAZY_BIRD_WEBHOOK_SECRET: "whsec_test_integration_secret_min16"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v1/\")'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  lazy-bird-mock:
    build:
      context: ..
      dockerfile: docker/Dockerfile.lazy-bird-mock
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9000/api/v1/health\")'"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test-runner
    depends_on:
      plane-api:
        condition: service_healthy
      lazy-bird-mock:
        condition: service_healthy
    environment:
      PLANE_API_URL: "http://plane-api:8000"
      LAZY_BIRD_MOCK_URL: "http://lazy-bird-mock:9000"
      LAZY_BIRD_API_KEY: "lb_test_integration_key"
      LAZY_BIRD_WEBHOOK_SECRET: "whsec_test_integration_secret_min16"
